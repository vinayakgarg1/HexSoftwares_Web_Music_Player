<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="music-player">
        <div class="artwork-container">
            <img id="cover-image" src="" alt="Album Art">
        </div>

        <div class="player-info">
            <h2 id="song-title">Select a Song</h2>
            <p id="song-artist">Artist</p>
        </div>

        <audio id="audio-element"></audio>

        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0">
            <span id="total-duration">0:00</span>
        </div>

        <div class="controls">
            <button id="prev-btn" class="control-btn" title="Previous">⏮</button>
            <button id="play-btn" class="control-btn play-pause" title="Play/Pause">▶️</button>
            <button id="next-btn" class="control-btn" title="Next">⏭</button>
        </div>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="1">
            <span>🔊</span>
        </div>

        <div class="playlist-section">
            <h3>Playlist</h3>
            <ul id="playlist">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
